apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gedtotal-ocr-service
  namespace: argocd
spec:
  destination:
    namespace: gedtotalap-apps
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/eurival/gedtotal-ocr-service.git
    targetRevision: main
    path: infra/kubernetes
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
