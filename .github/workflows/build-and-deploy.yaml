name: Build and Push 'gedtotal-ocr-service' Docker Image

on:
  push:
    branches: ['main']
    paths-ignore:
      - 'infra/kubernetes/**'
      - 'README.md'
      - 'docs/**'

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: docker.io/eurival/gedtotal-ocr-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Definir versao da imagem
        run: echo "IMAGE_VERSION=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}

      - name: Instalar yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Atualizar tag no kustomization.yaml
        run: |
          FILE="infra/kubernetes/kustomization.yaml"
          yq -i '
            (.images[] | select(.name == env(IMAGE_NAME))).newTag = env(IMAGE_VERSION)
          ' "$FILE"

      - name: Commit & push da nova tag
        run: |
          git config user.name  "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add infra/kubernetes/kustomization.yaml
          if git diff --cached --quiet; then
            echo "Nada para commitar (tag ja esta atual)"; exit 0
          fi
          git commit -m "chore(deploy): gedtotal-ocr-service ${IMAGE_VERSION}"
          git push
